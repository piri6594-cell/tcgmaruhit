<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0c0b09">
<link rel="manifest" href="/manifest.json">
<title>TCGMARUHIT — 포켓몬 카드 도감·시세·진단</title>
<style>
:root{--bg:#0c0b09;--card:#14110e;--text:#e8e3d8;--muted:#8a847a;--dim:#5a554d;--line:#231f1a;--accent:#f0ebe0;--gold:#d4a64e;--green:#5a9e5a;--red:#c44a4a;--blue:#4a7a9e;--orange:#c89a3e}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:"Pretendard","Malgun Gothic",sans-serif;font-size:14px;line-height:1.65;-webkit-tap-highlight-color:transparent}
a{color:inherit;text-decoration:none}
.wrap{max-width:860px;margin:0 auto;padding:0 14px}
/* 헤더 */
header{position:sticky;top:0;z-index:50;background:rgba(12,11,9,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.header-in{display:flex;align-items:center;justify-content:space-between;height:52px}
.logo{font-weight:800;font-size:20px;letter-spacing:-.04em;color:var(--accent)}
.logo span{color:var(--gold)}
.header-stats{display:flex;gap:12px;font-size:11px;color:var(--muted)}
.header-stat{text-align:center}
.header-stat b{display:block;font-size:14px;color:var(--text)}
.hamburger{width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:6px}
.hamburger:hover{background:var(--card)}
.hamburger svg{width:20px;height:20px;stroke:var(--text)}
/* 탭 */
.tabs{display:flex;overflow-x:auto;border-bottom:1px solid var(--line);position:sticky;top:52px;z-index:49;background:rgba(12,11,9,.95);backdrop-filter:blur(8px);-ms-overflow-style:none;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;padding:10px 16px;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:.15s}
.tab.active{color:var(--accent);border-bottom-color:var(--gold)}
.tab:hover{color:var(--text)}
/* 배너 */
.banner{margin:14px 0;padding:20px 18px;border-radius:14px;border:1px solid var(--line);position:relative;overflow:hidden}
.banner-dark{background:linear-gradient(135deg,#1a1510,#0f0d0a)}
.banner h2{font-size:18px;font-weight:700;margin-bottom:6px}
.banner p{color:var(--muted);font-size:13px}
.banner-tags{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.banner-tag{padding:3px 10px;border-radius:20px;font-size:11px;border:1px solid var(--line);color:var(--muted)}
/* 박스 그리드 */
.box-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin:14px 0}
.box-card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px;cursor:pointer;transition:transform .15s,border-color .15s}
.box-card:hover{transform:translateY(-2px);border-color:var(--dim)}
.box-card .bn{font-weight:700;font-size:14px;margin-bottom:4px}
.box-card .bc{color:var(--dim);font-size:11px}
.box-card .bp{margin-top:8px;font-weight:700;font-size:17px;font-variant-numeric:tabular-nums}
.box-card .bp small{font-size:11px;color:var(--muted);font-weight:400}
.box-card .bev{font-size:11px;margin-top:2px}
.evgood{color:var(--green)}.evbad{color:var(--red)}.evmid{color:var(--orange)}
/* 박스 상세 */
.box-detail{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);overflow-y:auto}
.box-detail-in{max-width:680px;margin:40px auto;background:var(--bg);border:1px solid var(--line);border-radius:14px;padding:24px 20px}
.box-detail .close{float:right;cursor:pointer;font-size:24px;color:var(--muted);line-height:1}
.hit-list{margin:16px 0}
.hit-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--line)}
.hit-row:last-child{border:0}
.hit-name{flex:1}
.hit-rarity{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;margin-left:6px}
.r-SR{background:#2a1f10;color:var(--gold)}.r-SAR{background:#1a1520;color:#b89ee8}.r-AR{background:#101820;color:var(--blue)}.r-R{background:#201a10;color:var(--orange)}.r-master{background:#2a1010;color:#ff6b6b}
.hit-price{font-weight:700;font-variant-numeric:tabular-nums;text-align:right;min-width:80px}
.hit-rate{color:var(--dim);font-size:11px;text-align:right;min-width:50px}
.ev-box{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px;margin:16px 0;text-align:center}
.ev-box .ev-val{font-size:28px;font-weight:800}
.ev-box .ev-label{color:var(--muted);font-size:12px}
/* 트렌딩 */
.trend-section{margin:20px 0}
.trend-tabs{display:flex;gap:6px;margin-bottom:12px}
.trend-tab{padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;color:var(--muted);border:1px solid var(--line)}
.trend-tab.active{color:var(--accent);border-color:var(--accent)}
.trend-list{display:flex;flex-direction:column;gap:0}
.trend-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);gap:10px}
.trend-rank{width:24px;font-weight:700;color:var(--dim);text-align:center}
.trend-name{flex:1;font-size:14px}
.trend-name small{display:block;color:var(--dim);font-size:11px}
.trend-price{font-weight:700;font-variant-numeric:tabular-nums;text-align:right}
.trend-change{font-size:11px;text-align:right;min-width:60px}
.up{color:var(--green)}.down{color:var(--red)}
/* 진단 */
.upload-area{border:2px dashed #33312d;border-radius:12px;padding:40px 20px;text-align:center;cursor:pointer;transition:.2s;margin:14px 0}
.upload-area:hover{border-color:var(--muted);background:var(--card)}
.upload-area.dragover{border-color:var(--gold);background:var(--card)}
.upload-icon{font-size:36px;margin-bottom:8px}
.upload-area p{color:var(--muted);font-size:13px}
.result-box{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px;margin:14px 0}
.result-box h3{font-size:15px;font-weight:600;margin-bottom:12px;color:var(--accent)}
.grade-big{font-size:36px;font-weight:800;text-align:center;padding:16px 0}
.grade-table{width:100%;border-collapse:collapse}
.grade-table td,.grade-table th{padding:6px;border-bottom:1px solid var(--line);font-size:13px}
.grade-table th{text-align:left;color:var(--muted);font-weight:500}
.grade-table td{text-align:right;font-variant-numeric:tabular-nums}
.qwen-out{font-size:13px;white-space:pre-wrap;padding:8px 0;border-bottom:1px solid var(--line)}
.qwen-out:last-child{border:0}
/* 도감 */
.coll-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:14px 0}
.coll-box{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:12px 8px;text-align:center}
.coll-box .lb{font-size:10px;color:var(--muted);margin-bottom:4px}
.coll-box .vl{font-size:17px;font-weight:700;font-variant-numeric:tabular-nums}
.coll-table{width:100%;border-collapse:collapse;font-size:13px}
.coll-table th,.coll-table td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;font-variant-numeric:tabular-nums}
.coll-table th:first-child,.coll-table td:first-child{text-align:left}
.coll-table thead th{color:var(--muted);font-size:11px;font-weight:500}
.coll-empty{text-align:center;color:var(--muted);padding:48px 20px}
/* 정산 */
.settle-in{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.settle-in input{flex:1;min-width:100px;padding:8px 10px;background:var(--card);border:1px solid var(--line);border-radius:6px;color:var(--text);font-size:14px;font-variant-numeric:tabular-nums}
.settle-in label{font-size:11px;color:var(--muted);display:block;margin-bottom:3px}
.settle-table{width:100%;border-collapse:collapse;font-size:13px}
.settle-table th,.settle-table td{padding:8px 6px;border-bottom:1px solid var(--line);text-align:right;font-variant-numeric:tabular-nums}
.settle-table th:first-child,.settle-table td:first-child{text-align:left}
.settle-table thead th{color:var(--muted);font-size:11px}
.btn{display:inline-block;padding:8px 18px;border:1px solid var(--muted);border-radius:6px;cursor:pointer;font-size:14px;color:var(--text);background:transparent}
.btn:hover{background:var(--card)}
.btn-gold{border-color:var(--gold);background:var(--gold);color:#0c0b09;font-weight:700}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-red{border-color:var(--red);color:var(--red)}
.save-bar{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px;margin-top:14px}
.save-bar h3{font-size:14px;font-weight:600;margin-bottom:10px}
.save-bar .row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.save-bar input,.save-bar select{flex:1;min-width:80px;padding:6px 8px;background:var(--bg);border:1px solid var(--line);border-radius:5px;color:var(--text);font-size:13px}
.save-bar label{font-size:10px;color:var(--muted);display:block;margin-bottom:2px}
.loading-overlay{text-align:center;padding:40px}
.spinner{width:32px;height:32px;border:3px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.panel{display:none}.panel.active{display:block}
.disclaimer{text-align:center;color:var(--dim);font-size:11px;padding:16px 0;border-top:1px solid var(--line);margin-top:20px}
.health-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:4px}
@media(max-width:600px){
.box-grid{grid-template-columns:repeat(2,1fr)}
.coll-summary{grid-template-columns:repeat(2,1fr)}
.header-stats{display:none}
}
</style>
</head>
<body>
<header>
<div class="wrap">
<div class="header-in">
<div class="logo">TCG<span>MARU</span>HIT</div>
<div class="header-stats">
<div class="header-stat"><b id="hBoxes">12</b>박스</div>
<div class="header-stat"><b id="hHits">0</b>히트카드</div>
<div class="header-stat"><b id="hColl">0</b>도감</div>
</div>
<div class="hamburger" onclick="toggleMenu()">
<svg viewBox="0 0 24 24" fill="none" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
</div>
</div>
</div>
</header>

<div class="wrap">
<div class="tabs">
<div class="tab active" data-t="home">홈</div>
<div class="tab" data-t="boxes">박스</div>
<div class="tab" data-t="trending">트렌딩</div>
<div class="tab" data-t="grade">진단</div>
<div class="tab" data-t="settle">정산</div>
<div class="tab" data-t="collection">도감</div>
</div>
</div>

<!-- 홈 -->
<div id="p-home" class="panel active">
<div class="wrap">
<div class="banner banner-dark">
<h2>📦 이번주 주목 박스</h2>
<p id="bannerDesc">불러오는 중...</p>
<div class="banner-tags">
<span class="banner-tag" id="bannerTag1">한국판</span>
<span class="banner-tag" id="bannerTag2">30팩</span>
</div>
</div>

<div class="trend-section">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
<h3 style="font-size:16px;font-weight:700">🔥 히트카드 순위</h3>
<span style="font-size:12px;color:var(--muted)">예상 시세 기준</span>
</div>
<div id="homeHits" class="trend-list"></div>
</div>

<div class="trend-section">
<h3 style="font-size:16px;font-weight:700;margin-bottom:12px">📦 인기 박스</h3>
<div id="homeBoxes" class="box-grid"></div>
</div>
</div>
</div>

<!-- 박스 -->
<div id="p-boxes" class="panel">
<div class="wrap">
<h3 style="font-size:18px;font-weight:700;margin:16px 0">박스 전체</h3>
<div id="boxesGrid" class="box-grid"></div>
</div>
</div>

<!-- 트렌딩 -->
<div id="p-trending" class="panel">
<div class="wrap">
<h3 style="font-size:18px;font-weight:700;margin:16px 0">히트카드 전체</h3>
<div class="trend-tabs">
<div class="trend-tab active" data-filter="all">전체</div>
<div class="trend-tab" data-filter="SR">SR</div>
<div class="trend-tab" data-filter="SAR">SAR</div>
<div class="trend-tab" data-filter="AR">AR</div>
<div class="trend-tab" data-filter="master">master</div>
</div>
<div id="trendList" class="trend-list"></div>
</div>
</div>

<!-- 진단 -->
<div id="p-grade" class="panel">
<div class="wrap">
<!-- 카메라 영역 -->
<div id="cameraArea" style="position:relative;margin:14px 0">
  <div style="position:relative;width:100%;max-width:360px;margin:0 auto;aspect-ratio:5/7;background:var(--card);border-radius:12px;overflow:hidden">
    <video id="cameraVideo" autoplay playsinline style="width:100%;height:100%;object-fit:cover"></video>
    <canvas id="overlayCanvas" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none"></canvas>
    <!-- 가이드 박스 -->
    <div id="guideBox" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none">
      <div id="guideFrame" style="width:72%;height:88%;border:3px dashed rgba(212,166,78,0.5);border-radius:8px;transition:border-color .3s;display:flex;align-items:center;justify-content:center">
        <div style="text-align:center;color:rgba(212,166,78,0.6);font-size:13px" id="guideText">카드를 여기에 맞춰주세요</div>
      </div>
    </div>
    <!-- 상태 표시 -->
    <div id="cameraStatus" style="position:absolute;top:8px;left:8px;right:8px;display:flex;gap:6px;justify-content:center">
      <span id="glareWarn" class="cam-warn" style="display:none;background:rgba(196,74,74,0.85);padding:3px 10px;border-radius:12px;font-size:11px;color:#fff">⚠️ 빛 반사 — 각도를 바꿔주세요</span>
      <span id="alignWarn" class="cam-warn" style="display:none;background:rgba(200,154,62,0.85);padding:3px 10px;border-radius:12px;font-size:11px;color:#fff">카드를 가이드에 맞춰주세요</span>
      <span id="readyOk" style="display:none;background:rgba(90,158,90,0.85);padding:3px 10px;border-radius:12px;font-size:11px;color:#fff">✓ 찰영 준비 완료</span>
    </div>
  </div>
  <div style="text-align:center;margin-top:12px;display:flex;gap:8px;justify-content:center">
    <button class="btn" id="btnStartCamera" onclick="startCamera()">📷 카메라 시작</button>
    <button class="btn btn-gold" id="btnCapture" onclick="capturePhoto()" disabled style="opacity:.5">📸 촬영</button>
    <button class="btn" id="btnRetake" onclick="retakePhoto()" style="display:none">🔄 다시 찍기</button>
    <button class="btn" id="btnUpload" onclick="document.getElementById('fileInputAlt').click()">📁 파일 선택</button>
    <input type="file" id="fileInputAlt" accept="image/*" style="display:none" onchange="handleFileAlt(this.files[0])">
  </div>
  <div id="previewBox" style="display:none;text-align:center;margin:10px 0"><img id="previewImg" style="max-width:100%;border-radius:8px"></div>
</div>
<div id="gradeLoading" class="loading-overlay" style="display:none"><div class="spinner"></div><p id="loadingText">분석 중…</p></div>
<div id="gradeResults" style="display:none"></div>
<div id="saveBar" class="save-bar" style="display:none">
<h3>도감에 저장</h3>
<div class="row">
<div style="flex:2"><label>카드 이름</label><input type="text" id="svName" placeholder="자동 식별 결과"></div>
<div style="flex:1"><label>판본</label><select id="svLang"><option value="kr">한국판</option><option value="jp">일본판</option><option value="en">영어판</option></select></div>
</div>
<div class="row">
<div style="flex:1"><label>원가</label><input type="number" id="svCost" value="0" min="0"></div>
<div style="flex:1"><label>시세</label><input type="number" id="svPrice" value="0" min="0"></div>
<div style="flex:1"><label>상태</label><select id="svCond"><option value="raw">Raw</option><option value="psa9">PSA 9</option><option value="psa10">PSA 10</option></select></div>
</div>
<button class="btn btn-gold btn-sm" onclick="saveCard()">도감에 등록</button>
<span id="svResult" style="margin-left:8px;font-size:12px"></span>
</div>
</div>
</div>

<!-- 정산 -->
<div id="p-settle" class="panel">
<div class="wrap">
<h3 style="font-size:18px;font-weight:700;margin:16px 0 12px">정산예상액</h3>
<div class="settle-in">
<div style="flex:1"><label>판매가 (원)</label><input type="number" id="stPrice" value="12000" min="0"></div>
<div style="flex:1"><label>내 원가 (원)</label><input type="number" id="stCost" value="10000" min="0"></div>
</div>
<button class="btn btn-gold" onclick="calcSettle()">계산</button>
<div id="settleOut" style="margin-top:16px"></div>
</div>
</div>

<!-- 도감 -->
<div id="p-collection" class="panel">
<div class="wrap">
<div id="collSummary" class="coll-summary"></div>
<div style="display:flex;justify-content:space-between;align-items:center;margin:12px 0">
<h3 style="font-size:16px;font-weight:700">내 도감</h3>
<button class="btn btn-sm" onclick="loadColl()">새로고침</button>
</div>
<div id="collList"></div>
</div>
</div>

<!-- 박스 상세 모달 -->
<div id="boxModal" class="box-detail" onclick="if(event.target===this)closeBoxModal()">
<div class="box-detail-in" id="boxModalContent"></div>
</div>

<div class="wrap"><p class="disclaimer">데이터는 참고용이며 실제 거래가와 다를 수 있습니다 · TCGMARUHIT</p></div>

<script>
const $=id=>document.getElementById(id);
let allHits=[],allBoxes=[],lastGrade=null;

// 탭
document.querySelectorAll('.tab').forEach(t=>{
t.addEventListener('click',()=>{
document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
t.classList.add('active');
$('p-'+t.dataset.t).classList.add('active');
if(t.dataset.t==='collection')loadColl();
});
});

// 트렌드 필터
document.querySelectorAll('.trend-tab').forEach(t=>{
t.addEventListener('click',()=>{
document.querySelectorAll('.trend-tab').forEach(x=>x.classList.remove('active'));
t.classList.add('active');
renderTrend(t.dataset.filter);
});
});

// ═══ 데이터 로드 ═══
async function initData(){
try{
const [br,hr,cr]=await Promise.all([
fetch('/api/boxes').then(r=>r.json()),
fetch('/api/hit-cards').then(r=>r.json()),
fetch('/api/collection/summary').then(r=>r.json()),
]);
allBoxes=br;allHits=hr;
$('hBoxes').textContent=allBoxes.length;
$('hHits').textContent=allHits.length;
$('hColl').textContent=cr.count;
renderHomeBoxes();renderHomeHits();renderBanner();
renderBoxes();
renderTrend('all');
}catch(e){
console.error('initData error:',e);
$('homeHits').innerHTML='<div style="color:var(--muted);padding:20px;text-align:center">데이터 로드 실패: '+e.message+'</div>';
}
}

function fmt(n){return n.toLocaleString()}
function evClass(r){return r>=80?'evgood':r>=40?'evmid':'evbad'}

function renderBanner(){
if(!allBoxes.length)return;
const sorted=[...allBoxes].sort((a,b)=>b.price_kr-a.price_kr);
const b=sorted[0];
$('bannerDesc').textContent=`${b.name} (${b.code}) — 한국판 ${fmt(b.price_kr)}원 · 일본판 ${fmt(b.price_jp)}원`;
}

function renderHomeBoxes(){
const sorted=[...allBoxes].sort((a,b)=>{
const eva=a.hits.reduce((s,h)=>{try{return s+h.p/parseInt(h.rate.split('/')[1])}catch{return s}},0);
const evb=b.hits.reduce((s,h)=>{try{return s+h.p/parseInt(h.rate.split('/')[1])}catch{return s}},0);
return (evb/b.price_kr)-(eva/a.price_kr);
}).slice(0,6);
$('homeBoxes').innerHTML=sorted.map(b=>{
const ev=b.hits.reduce((s,h)=>{try{return s+h.p/parseInt(h.rate.split('/')[1])}catch{return s}},0);

// ═══ 진단 — 카메라 + 가이드 ═══
let cameraStream=null,cameraReady=false,lastGrade=null;
let analyzeCheckTimer=null;

async function startCamera(){
try{
cameraStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:1080},height:{ideal:1920}}});
$('cameraVideo').srcObject=cameraStream;
$('btnStartCamera').style.display='none';
$('btnCapture').style.display='inline-block';
await new Promise(r=>$('cameraVideo').onloadedmetadata=r);
cameraReady=true;
// 실시간 품질 체크 시작
if(analyzeCheckTimer)clearInterval(analyzeCheckTimer);
analyzeCheckTimer=setInterval(checkCardQuality,800);
}catch(e){
alert('카메라를 시작할 수 없습니다: '+e.message+'\n\n파일 선택 버튼을 사용하세요.');
}
}

function checkCardQuality(){
if(!cameraReady)return;
const v=$('cameraVideo');const c=$('overlayCanvas');
const vw=v.videoWidth,vh=v.videoHeight;
if(!vw)return;
c.width=vw;c.height=vh;
const ctx=c.getContext('2d');
ctx.drawImage(v,0,0,vw,vh);
const imgData=ctx.getImageData(0,0,vw,vh);
const data=imgData.data;
// 빛 반사 감지: 240 이상 픽셀 비율
let bright=0,total=0;
for(let i=0;i<data.length;i+=16){total++;if(data[i]>240&&data[i+1]>240&&data[i+2]>240)bright++;}
const brightRatio=bright/total;
// 가이드 표시 업데이트
const frame=$('guideFrame');
const hasGlare=brightRatio>0.12;
if(hasGlare){
frame.style.borderColor='rgba(196,74,74,0.7)';
$('glareWarn').style.display='inline-block';
$('alignWarn').style.display='none';
$('readyOk').style.display='none';
$('btnCapture').disabled=true;$('btnCapture').style.opacity=.5;
}else{
$('glareWarn').style.display='none';
frame.style.borderColor='rgba(90,158,90,0.7)';
$('readyOk').style.display='inline-block';
$('alignWarn').style.display='none';
$('btnCapture').disabled=false;$('btnCapture').style.opacity=1;
}
}

function capturePhoto(){
if(!cameraReady)return;
const v=$('cameraVideo');
const vw=v.videoWidth,vh=v.videoHeight;
const c=document.createElement('canvas');
// 카드 비율로 크롭 (5:7)
const targetRatio=5/7;
let cw=vw,ch=Math.round(vw/targetRatio);
if(ch>vh){ch=vh;cw=Math.round(vh*targetRatio);}
const sx=Math.round((vw-cw)/2),sy=Math.round((vh-ch)/2);
c.width=cw;c.height=ch;
const ctx=c.getContext('2d');
ctx.drawImage(v,sx,sy,cw,ch,0,0,cw,ch);
c.toBlob(blob=>{
const file=new File([blob],'capture.jpg',{type:'image/jpeg'});
stopCamera();
doAnalyze(file);
},'image/jpeg',0.92);
}

function stopCamera(){
if(cameraStream){cameraStream.getTracks().forEach(t=>t.stop());cameraStream=null;}
cameraReady=false;
if(analyzeCheckTimer){clearInterval(analyzeCheckTimer);analyzeCheckTimer=null;}
$('cameraVideo').style.display='none';
$('guideBox').style.display='none';
$('cameraStatus').style.display='none';
}

function retakePhoto(){
$('gradeResults').style.display='none';
$('saveBar').style.display='none';
$('previewBox').style.display='none';
$('cameraVideo').style.display='block';
$('guideBox').style.display='flex';
$('cameraStatus').style.display='flex';
$('btnCapture').style.display='inline-block';
$('btnRetake').style.display='none';
startCamera();
}

function handleFileAlt(file){
if(!file)return;
stopCamera();
$('btnStartCamera').style.display='none';
$('btnCapture').style.display='none';
const r=new FileReader();
r.onload=e=>{$('previewImg').src=e.target.result;$('previewBox').style.display='block'};
r.readAsDataURL(file);
doAnalyze(file);
}

function doAnalyze(file){
$('gradeLoading').style.display='block';
$('loadingText').textContent='분석 중… 센터링 + AI 비전 5영역';
$('gradeResults').style.display='none';
$('saveBar').style.display='none';
$('btnCapture').style.display='none';
$('btnRetake').style.display='inline-block';
const fd=new FormData();fd.append('image',file);
fetch('/api/analyze',{method:'POST',body:fd}).then(r=>r.json()).then(d=>{
if(d.error)throw new Error(d.error);
lastGrade=d;
renderGrade(d);
$('saveBar').style.display='block';
// 카드 식별 결과가 있으면 이름 자동 입력
if(d.card_identified&&d.card_name)$('svName').value=d.card_name;
}).catch(e=>{
$('gradeLoading').innerHTML=`<p style="color:var(--red)">오류: ${e.message}</p><p style="margin-top:10px"><button class="btn" onclick="location.reload()">다시</button></p>`;
return;
});
$('gradeLoading').style.display='none';
$('gradeResults').style.display='block';
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
const rn={top_left:'왼쪽 위',top_right:'오른쪽 위',bottom_left:'왼쪽 아래',bottom_right:'오른쪽 아래'};

function renderGrade(d){
const c=d.centering;const ms=d.overall_min_score;
const gc=ms>=10?'var(--green)':ms>=9?'var(--orange)':'var(--red)';
// 카드 식별 결과
let cardInfo='';
if(d.card_identified&&d.card_name){
cardInfo=`<div style="background:var(--card);border:1px solid var(--line);border-radius:8px;padding:10px 14px;margin-bottom:12px;display:flex;align-items:center;gap:8px"><span style="font-size:20px">🃏</span><div><div style="font-size:12px;color:var(--muted)">식별된 카드</div><div style="font-size:16px;font-weight:700">${esc(d.card_name)}</div></div></div>`;
}
// 품질 경고
let qualityWarn='';
if(d.quality){
const q=d.quality;const warns=[];
if(q.glare_warning)warns.push('⚠️ 빛 반사 감지 — 스크래치로 오판될 수 있음');
if(q.blur_warning)warns.push('⚠️ 사진이 흐림 — 정확도 저하');
if(!q.resolution_ok)warns.push('⚠️ 해상도 부족 — 더 가까이서 촬영');
if(!d.card_detected)warns.push('⚠️ 카드 영역 감지 실패 — 가이드에 맞춰 촬영');
if(warns.length)qualityWarn=`<div style="background:rgba(200,154,62,0.1);border:1px solid rgba(200,154,62,0.3);border-radius:8px;padding:10px 14px;margin-bottom:12px">${warns.map(w=>`<div style="font-size:12px;color:var(--orange);padding:2px 0">${w}</div>`).join('')}</div>`;
}
$('gradeResults').innerHTML=`
${cardInfo}
${qualityWarn}
<div class="result-box" style="text-align:center">
<div style="font-size:12px;color:var(--muted)">종합 등급 구간</div>
<div class="grade-big" style="color:${gc}">${d.overall_grade_range}</div>
<div style="font-size:12px;color:var(--muted)">신뢰도: ${d.overall_confidence}${d.backend==='gemini'?' (Gemini)':' (Qwen)'}</div>
<div style="text-align:left;margin-top:12px">${d.notes.map(n=>`<div style="font-size:13px;padding:3px 0">• ${n}</div>`).join('')}</div>
</div>
<div class="result-box">
<h3>센터링 측정</h3>
<table class="grade-table">
<tr><th>수평 (좌/우)</th><td><b>${c.horizontal_ratio}</b></td></tr>
<tr><th>수직 (상/하)</th><td><b>${c.vertical_ratio}</b></td></tr>
<tr><th>수평 편차</th><td style="color:${c.horizontal_worst<=55?'var(--green)':c.horizontal_worst<=60?'var(--orange)':'var(--red)'}">${c.horizontal_worst}%</td></tr>
<tr><th>수직 편차</th><td style="color:${c.vertical_worst<=55?'var(--green)':c.vertical_worst<=60?'var(--orange)':'var(--red)'}">${c.vertical_worst}%</td></tr>
<tr><th>센터링 등급</th><td><b>PSA ${c.centering_grade}</b></td></tr>
</table>
<div style="text-align:center;margin-top:10px"><img src="data:image/jpeg;base64,${d.annotated_b64}" style="max-width:100%;border-radius:6px"></div>
</div>
<div class="result-box">
<h3>AI 비전 — 모서리·표면</h3>
${Object.entries(d.qwen_corners).map(([k,v])=>`<div style="margin-bottom:10px"><div style="font-size:12px;color:var(--muted);margin-bottom:3px">${rn[k]||k}</div><div class="qwen-out">${esc(v)}</div></div>`).join('')}
<div style="margin-bottom:10px"><div style="font-size:12px;color:var(--muted);margin-bottom:3px">표면 중앙</div><div class="qwen-out">${esc(d.qwen_surface)}</div></div>
</div>
<p style="text-align:center;color:var(--dim);font-size:11px;padding:8px 0">${d.disclaimer}</p>
`;
}

async function saveCard(){
const name=$('svName').value.trim()||'미입력';

const cost=parseInt($('svCost').value)||0;
const price=parseInt($('svPrice').value)||0;
const cond=$('svCond').value;
const r=await fetch('/api/collection',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,lang,cost,current_price:price,condition:cond,grade_range:lastGrade?.overall_grade_range||''})});
const d=await r.json();
$('svResult').innerHTML=`<span style="color:var(--green)">저장 #${d.id}</span>`;
}

const best=sorted[0];
$('settleOut').innerHTML=`
<div class="result-box" style="text-align:center">
<div style="font-size:12px;color:var(--muted)">최적 채널</div>
<div class="grade-big" style="color:${best.profit>=0?'var(--green)':'var(--red)'}">${best.channel}</div>
<div style="font-size:13px;color:var(--muted)">순수입 ${fmt(best.net_income)}원 · 손익 ${best.profit>=0?'+':''}${fmt(best.profit)}원 · ROI ${best.roi}%</div>
</div>
<table class="settle-table">
<thead><tr><th>채널</th><th>수수료</th><th>순수입</th><th>손익</th><th>ROI</th></tr></thead>

}
